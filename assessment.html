<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sonartra Signals Assessment</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="assessment">
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="logo" href="index.html">Sonartra</a>
        <nav>
          <a href="signals.html">Signals</a>
          <a href="results.html">Results</a>
        </nav>
      </div>
    </header>

    <main class="container section-gap">
      <p class="eyebrow">Signals Assessment</p>
      <h1>Behavioural data capture</h1>
      <p class="lead narrow">
        Answer each statement on a five-point scale. Responses are stored locally in your browser
        so you can return and complete the sequence.
      </p>

      <section class="card assessment-card">
        <div class="progress-track"><span id="progressBar"></span></div>
        <p class="question-meta" id="questionMeta"></p>
        <h2 id="questionText"></h2>

        <form id="scaleOptions" class="scale-grid"></form>

        <div class="button-row">
          <button id="backButton" type="button" class="button button-ghost">Back</button>
          <button id="nextButton" type="button" class="button">Next</button>
          <button id="finishButton" type="button" class="button button-accent">Finish</button>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>Responses are stored in localStorage for this prototype.</p>
      </div>
    </footer>

    <script src="questions.js"></script>
    <script src="signals.js"></script>
  </body>
</html>
